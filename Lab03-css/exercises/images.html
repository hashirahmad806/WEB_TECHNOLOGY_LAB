<!DOCTYPE html>
<html>

<head>

  <title>Image Styling</title>

  <link rel="stylesheet" href="../styles/components.css">

</head>

<body>

  <div class="title">
    <h1>Image Gallery</h1>
  </div>

  <div class="gallery">

    <div class="img-box">
      <img src="https://images.pexels.com/photos/414612/pexels-photo-414612.jpeg" alt="sample image">
      <div class="overlay">Beautiful Nature</div>
    </div>

    <div class="img-box">
      <img class="rounded" src="https://images.pexels.com/photos/414612/pexels-photo-414612.jpeg" alt="sample image">
      <div class="overlay">Rounded Image</div>
    </div>

    <div class="img-box">
      <img class="circle" src="https://images.pexels.com/photos/414612/pexels-photo-414612.jpeg" alt="sample image">
      <div class="overlay">Circle Image</div>
    </div>

  </div>

</body>

</html>
